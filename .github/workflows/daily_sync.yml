name: Daily Valve Rank Sync

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 2 * * *' # 2:00 AM UTC Daily
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5 # Official Node 24 version

      - name: Setup Python
        uses: actions/setup-python@v6 # Official Node 24 version
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Run Scraper
        run: python sync_valve_ranks.py

      - name: Commit and Push Changes
        # UPGRADE THIS LINE FROM @v5 TO @v7
        uses: stefanzweifel/git-auto-commit-action@v7 
        with:
          commit_message: "🛰️ AUTO-SYNC: CS2 Valve Rankings Updated"
          file_pattern: "cs2_manifest.json"
