name: Daily Prop Miner

on:
  schedule:
    - cron: '0 8 * * *' # Runs every day at 8:00 AM UTC (adjust as needed)
  workflow_dispatch: # Allows you to click a button to run it manually

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Miner Engine
        run: python miner.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add daily_stats.csv
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update daily_stats.csv" && git push)
